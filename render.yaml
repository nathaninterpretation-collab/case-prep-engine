services:
  - type: web
    name: case-prep-engine
    runtime: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
    disk:
      name: cpe-data
      mountPath: /opt/render/project/src/server/db
      sizeGB: 1
